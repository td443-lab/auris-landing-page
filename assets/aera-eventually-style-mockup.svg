    <path d="M1120 254C1197.87 254 1261 317.131 1261 395C1261 472.869 1197.87 536 1120 536C1042.13 536 979 472.869 979 395C979 372.003 984.503 350.28 993.918 331.086" stroke="url(#gold)" stroke-width="28" stroke-linecap="round"/>
    <rect x="1015" y="520" width="210" height="260" rx="105" fill="url(#capsule)"/>
    <path d="M1120.12 560C1154.63 602.337 1177.14 634.901 1187.69 657.691C1198.23 680.481 1202.6 701.327 1202.6 720.228C1202.6 764.98 1166.32 801.258 1121.57 801.258C1076.82 801.258 1040.54 764.98 1040.54 720.228C1040.54 701.327 1044.9 680.481 1055.45 657.691C1066 634.901 1088.51 602.337 1123.02 560H1120.12Z" fill="url(#water)"/>
