<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Aera | Hydration, Worn Lightly</title>
    <meta
      name="description"
      content="Aera is a hydration wearable disguised as a sculptural earring. Join the waitlist for the minimal, chic future of everyday hydration."
    />
    <link rel="stylesheet" href="styles.css" />
    <script src="config.js"></script>
  </head>
  <body>
    <div class="background" aria-hidden="true">
      <video
        class="background-video"
        autoplay
        muted
        loop
        playsinline
        preload="metadata"
        poster="assets/aera-eventually-style-mockup.svg"
      >
        <source src="assets/background-loop.mp4" type="video/mp4" />
      </video>
      <div class="background__layer background__layer--one"></div>
      <div class="background__layer background__layer--two"></div>
      <div class="background__layer background__layer--three"></div>
    </div>

    <main class="shell">
      <section class="launch-panel">
        <p class="eyebrow">Aera</p>
        <h1>Hydration, worn lightly.</h1>
        <p class="lede">
          A sculptural earring that helps you stay ahead of dehydration through
          subtle reminders designed to feel as effortless as the jewelry itself.
        </p>

        <form
          class="signup-form"
          id="signup-form"
          aria-label="Join the Aera waitlist"
          novalidate
        >
          <label class="sr-only" for="email">Email address</label>
          <input
            id="email"
            name="email"
            type="email"
            inputmode="email"
            autocomplete="email"
            placeholder="Email Address"
            required
          />
          <button type="submit">Sign Up</button>
        </form>
        <p class="form-status" id="form-status" role="status" aria-live="polite"></p>

        <p class="supporting-copy">
          Gentle hydration cues. Jewelry-first design. Early access for launch.
        </p>
      </section>
    </main>

    <aside class="product-visual" aria-label="Aera hydration earring display">
      <div class="product-visual__halo product-visual__halo--warm"></div>
      <div class="product-visual__halo product-visual__halo--cool"></div>
      <img
        src="assets/aera-earring-display.svg"
        alt="Rendered hydration earring with a polished gold hoop and glass-like hydration capsule"
      />
    </aside>

    <footer class="site-footer">
      <a href="mailto:hello@aera.wear?subject=Aera%20waitlist">hello@aera.wear</a>
    </footer>

    <script>
      const form = document.getElementById("signup-form");
      const emailInput = document.getElementById("email");
      const formStatus = document.getElementById("form-status");
      const submitButton = form.querySelector("button");
      const WAITLIST_ENDPOINT = window.AERA_CONFIG?.waitlistEndpoint || "";

      form.addEventListener("submit", async (event) => {
        event.preventDefault();

        const email = emailInput.value.trim();
        if (!email) {
          emailInput.focus();
          formStatus.textContent = "Please enter your email address.";
          return;
        }

        if (!WAITLIST_ENDPOINT) {
          formStatus.innerHTML =
            'Signup endpoint not connected yet. Add your Google Apps Script URL in <code>config.js</code>.';
          return;
        }

        submitButton.disabled = true;
        formStatus.textContent = "Submitting...";

        try {
          const response = await fetch(WAITLIST_ENDPOINT, {
            method: "POST",
            headers: {
              "Content-Type": "application/json"
            },
            body: JSON.stringify({
              email,
              source: "aera-landing-page",
              submittedAt: new Date().toISOString()
            })
          });

          if (!response.ok) {
            throw new Error("Request failed");
          }

          form.reset();
          formStatus.textContent = "You’re on the list. Thank you.";
        } catch (error) {
          formStatus.textContent =
            "Something went wrong. Please try again in a moment or email hello@aera.wear.";
        } finally {
          submitButton.disabled = false;
        }
      });
    </script>
  </body>
</html>
