  <text x="122" y="212" fill="rgba(255,255,255,0.78)" font-family="Avenir Next, Helvetica Neue, Arial, sans-serif" font-size="18" letter-spacing="6">AERA</text>

  <text x="118" y="366" fill="rgba(255,255,255,0.94)" font-family="Baskerville, Times New Roman, serif" font-size="106" letter-spacing="-4">
    <tspan x="118" dy="0">Hydration,</tspan>
    <tspan x="118" dy="92">worn lightly.</tspan>
  </text>

  <text x="122" y="574" fill="rgba(255,255,255,0.68)" font-family="Avenir Next, Helvetica Neue, Arial, sans-serif" font-size="30">
    <tspan x="122" dy="0">A sculptural earring that helps you stay ahead of</tspan>
    <tspan x="122" dy="44">dehydration through subtle reminders designed to feel</tspan>
    <tspan x="122" dy="44">as effortless as the jewelry itself.</tspan>
  </text>

  <rect x="120" y="666" width="526" height="54" rx="6" fill="rgba(255,255,255,0.05)" stroke="rgba(255,255,255,0.18)"/>
  <text x="144" y="701" fill="rgba(255,255,255,0.46)" font-family="Avenir Next, Helvetica Neue, Arial, sans-serif" font-size="22">Email Address</text>
  <rect x="664" y="666" width="145" height="54" rx="6" fill="rgba(255,255,255,0.94)"/>
  <text x="699" y="701" fill="#111111" font-family="Avenir Next, Helvetica Neue, Arial, sans-serif" font-size="22">Sign Up</text>

  <text x="122" y="784" fill="rgba(255,255,255,0.46)" font-family="Avenir Next, Helvetica Neue, Arial, sans-serif" font-size="22">
